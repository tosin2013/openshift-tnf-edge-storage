{{- if .Values.components.linstorOperator.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-linstor-operator
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "linbit-edge-storage"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/linstor-operator
    helm:
      valuesObject:
        operator:
          enabled: {{ .Values.components.linstorOperator.enabled }}
          namespace: {{ .Values.components.linstorOperator.namespace }}
          channel: {{ .Values.components.linstorOperator.channel }}
          source: {{ .Values.components.linstorOperator.source }}
          sourceNamespace: {{ .Values.components.linstorOperator.sourceNamespace }}
          installPlanApproval: {{ .Values.components.linstorOperator.installPlanApproval }}
        storagePool:
          name: {{ .Values.components.linstorOperator.storagePool.name }}
          providerType: {{ .Values.components.linstorOperator.storagePool.providerType }}
          devicePaths:
          {{- range .Values.components.linstorOperator.storagePool.devicePaths }}
            - {{ . }}
          {{- end }}
        registrySecret:
          create: {{ .Values.components.linstorOperator.registrySecret.create }}
          name: {{ .Values.components.linstorOperator.registrySecret.name | quote }}
          server: {{ .Values.components.linstorOperator.registrySecret.server | quote }}
          username: {{ .Values.components.linstorOperator.registrySecret.username | quote }}
          password: {{ .Values.components.linstorOperator.registrySecret.password | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.linstorOperator.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}

{{- if .Values.components.storageclasses.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-storageclasses
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "linbit-edge-storage"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/storageclasses
    helm:
      valuesObject:
        rwoLocality:
          name: {{ .Values.components.storageclasses.rwoLocality.name }}
          replicaCount: {{ .Values.components.storageclasses.rwoLocality.replicaCount }}
          storagePool: {{ .Values.components.storageclasses.rwoLocality.storagePool }}
          fsType: {{ .Values.components.storageclasses.rwoLocality.fsType }}
        rwxVirt:
          name: {{ .Values.components.storageclasses.rwxVirt.name }}
          replicaCount: {{ .Values.components.storageclasses.rwxVirt.replicaCount }}
          storagePool: {{ .Values.components.storageclasses.rwxVirt.storagePool }}
          allowTwoPrimaries: {{ .Values.components.storageclasses.rwxVirt.allowTwoPrimaries }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}

