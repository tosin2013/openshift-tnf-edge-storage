apiVersion: v1
kind: Service
metadata:
  name: sample-db
  namespace: {{ .Values.database.namespace }}
  labels:
    app: sample-db
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: sample-db
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sample-db
  namespace: {{ .Values.database.namespace }}
  labels:
    app: sample-db
spec:
  serviceName: sample-db
  replicas: 1
  selector:
    matchLabels:
      app: sample-db
  template:
    metadata:
      labels:
        app: sample-db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.database.image }}
          env:
            - name: POSTGRESQL_USER
              value: demo
            - name: POSTGRESQL_PASSWORD
              value: demo
            - name: POSTGRESQL_DATABASE
              value: workshop
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.database.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.database.storageSize }}
