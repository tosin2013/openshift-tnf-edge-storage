apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sample-vm-disk
  namespace: {{ .Values.vm.namespace }}
  labels:
    app: sample-vm
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Block
  storageClassName: {{ .Values.vm.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.vm.diskSize }}
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: sample-vm
  namespace: {{ .Values.vm.namespace }}
  labels:
    app: sample-vm
spec:
  running: false
  template:
    metadata:
      labels:
        app: sample-vm
        vm.kubevirt.io/name: sample-vm
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: datadisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel9/rhel-guest-image:latest
        - name: datadisk
          persistentVolumeClaim:
            claimName: sample-vm-disk
