{{- if and .Values.registrySecret.create .Values.registrySecret.username .Values.registrySecret.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registrySecret.name | default "drbdiocred" }}
  namespace: {{ .Values.operator.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{%q:{"username":%q,"password":%q,"auth":%q}}}` (.Values.registrySecret.server | default "drbd.io") .Values.registrySecret.username .Values.registrySecret.password (printf "%s:%s" .Values.registrySecret.username .Values.registrySecret.password | b64enc) | b64enc }}
{{- end }}
