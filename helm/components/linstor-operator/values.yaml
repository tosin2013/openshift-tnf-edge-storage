operator:
  enabled: true
  namespace: linbit-sds
  channel: stable-v2
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic

storagePool:
  name: lvm-thin
  providerType: "LVM_THIN"
  devicePaths:
    - /dev/nvme1n1

# LINBIT customer/trial registry credentials (drbd.io).
# Prefer injecting via ocp4_workload_field_content_helm_values from AgnosticD secrets.
# When create=true and username/password are set, a docker-registry Secret is rendered.
registrySecret:
  create: false
  name: drbdiocred
  server: drbd.io
  username: ""
  password: ""
