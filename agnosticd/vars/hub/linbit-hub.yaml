---
# ===================================================================
# LINBIT Edge Storage Workshop - Hub Cluster
# Runs RHACM + Showroom. No LINBIT workloads.
# ===================================================================

tag: main

cloud_provider: aws
config: openshift-cluster

aws_region: us-east-2

# AWS sandbox: use RHUI on RHEL AMIs; do not register to Satellite
install_satellite_repositories: false
install_rhn_repositories: false

cloud_tags:
  - owner: tosin@redhat.com
  - Purpose: linbit-workshop-hub
  - config: "{{ config }}"
  - guid: "{{ guid }}"

host_ssh_authorized_keys:
  - key: https://github.com/tosin2013.keys

bastion_setup_student_user: true
bastion_student_user_name: lab-user

# ===================================================================
# Collections (V2 — installs rhpds/core_workloads for FQCN roles)
# ===================================================================
requirements_content:
  collections:
    - name: https://github.com/rhpds/core_workloads.git
      type: git
      version: "{{ tag }}"

# ===================================================================
# OpenShift Settings - HA Hub (3 CP + 2 Workers)
# ===================================================================
cluster_name: linbit-hub

host_ocp4_installer_version: "4.22"
host_ocp4_installer_root_url: http://mirror.openshift.com/pub/openshift-v4/clients
host_ocp4_installer_set_user_data_kubeadmin_password: true

subdomain_base_suffix: .sandbox2530.opentlc.com

# ===================================================================
# Workloads (deployed on the hub) — V2 uses workloads, not infra_workloads
# ===================================================================
workloads:
  - agnosticd.core_workloads.ocp4_workload_cert_manager
  - agnosticd.core_workloads.ocp4_workload_authentication_htpasswd
  - agnosticd.core_workloads.ocp4_workload_rhacm
  - agnosticd.core_workloads.ocp4_workload_showroom

# ===================================================================
# Workload: ocp4_workload_cert_manager
# ===================================================================
ocp4_workload_cert_manager_channel: stable-v1
ocp4_workload_cert_manager_aws_region: "{{ aws_region }}"
ocp4_workload_cert_manager_aws_access_key_id: "{{ hostvars.localhost.route53user_access_key }}"
ocp4_workload_cert_manager_aws_secret_access_key: "{{ hostvars.localhost.route53user_secret_access_key }}"
ocp4_workload_cert_manager_use_catalog_snapshot: false
ocp4_workload_cert_manager_install_ingress_certificates: true
ocp4_workload_cert_manager_install_api_certificates: false

# ===================================================================
# Workload: ocp4_workload_authentication_htpasswd
# ===================================================================
ocp4_workload_authentication_htpasswd_admin_user: admin
ocp4_workload_authentication_htpasswd_remove_kubeadmin: false

# ===================================================================
# Workload: ocp4_workload_rhacm (core_workloads)
# Cluster defaultChannel is release-2.17 (2.14 is not available).
# ===================================================================
ocp4_workload_rhacm_acm_channel: release-2.17
ocp4_workload_rhacm_automatic_install_plan_approval: true

# ===================================================================
# Workload: ocp4_workload_showroom
# ===================================================================
ocp4_workload_showroom_content_git_repo: "https://github.com/tosin2013/openshift-tnf-edge-storage.git"
ocp4_workload_showroom_content_git_repo_ref: main
ocp4_workload_showroom_content_antora_playbook: site.yml
ocp4_workload_showroom_terminal_type: showroom
ocp4_workload_showroom_terminal_image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
